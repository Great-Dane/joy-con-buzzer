    <title>
      Joy-Con Demo

    <link rel="stylesheet" href="style.css" />

  <body>
    <h1>
      Dane's Joy-Con Buzzers
    </h1>
    <ol>
      <li>
        Connect the
        <a href="https://en.wikipedia.org/wiki/Joy-Con#Other_platforms"
          >Joy-Cons</a
        >
        and
        <a
          href="https://www.nintendo.co.jp/hardware/switch/onlineservice/specialoffer/fc_controller/index.html"
          >HVC-Controller</a
        >
        via the operating system's Bluetooth setup dialog.
      </li>
      <li>
        Click the button below to pair the Joy-Cons via
        <a href="https://web.dev/hid/">WebHID</a>.
        <div>
          <button id="connect-joy-cons" type="button">Connect Joy-Cons</button>
        </div>
      </li>
      <li>
        Swing the Joy-Cons around, move the joysticks, and press the buttons.
      </li>
    </ol>
    <div>
      <input id="show-debug" type="checkbox" />
      <label for="show-debug">Show debug info</label>
    </div>

    <div id="debug">
      <div id="debug-left">
        <pre></pre>
      </div>

      <div id="debug-right">
        <pre></pre>
        <post></post>
      </div>
    </div>

  </body>
